<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AZIZSY.</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b82f6'/><text x='50' y='72' font-family='sans-serif' font-size='65' font-weight='bold' fill='white' text-anchor='middle'>A</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="auth-container">
    <div class="glass" style="padding: 3rem; max-width: 400px; width: 100%; text-align: center;">
      <h1 class="gradient-text" style="font-size: 2rem; margin-bottom: 0.5rem;">Admin Portal</h1>
      <p style="color: var(--text-secondary); margin-bottom: 2rem;">Sign in to manage your portfolio</p>

      <form id="loginForm" style="display: flex; flex-direction: column; gap: 1rem;">
        <input type="text" class="input" placeholder="Username" required>
        <input type="password" class="input" placeholder="Password" required>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Login</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Simulate successful login
      localStorage.setItem('faziz_admin_logged_in', 'true');
      window.location.href = '/dashboard';
    });
  </script>
  <script src="/assets/js/script.js"></script>
</body>
</html>
