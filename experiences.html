<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AZIZSY. | Creative Developer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b82f6'/><text x='50' y='72' font-family='sans-serif' font-size='65' font-weight='bold' fill='white' text-anchor='middle'>A</text></svg>">
  <meta name="description"
    content="Portfolio of AZIZSY – Creative Developer & Designer crafting interactive web experiences.">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body data-page="experiences">

  <!-- Dynamic Components Placeholders -->
  <div id="cursor-placeholder"></div>
  <div id="navbar-placeholder"></div>
  <!-- Floating Particles Background -->
  <canvas id="particles-canvas"></canvas>

  <!-- Theme Toggle String -->
  <div id="theme-toggle-wrapper" style="position: fixed; top: 0; right: 5%; width: 60px; height: 300px; z-index: 999; pointer-events: none;">
    <svg id="theme-string-svg" width="100%" height="100%" style="overflow: visible; pointer-events: auto; cursor: grab;">
      <!-- Tali -->
      <path id="string-path" d="M 30 -20 Q 30 40 30 80" fill="transparent" stroke="var(--text-primary)" stroke-width="2" stroke-linecap="round"></path>
      <!-- Pegangan -->
      <circle id="string-handle" cx="30" cy="80" r="12" fill="var(--bg-secondary)" stroke="var(--accent-blue)" stroke-width="3" style="transition: fill 0.3s ease, stroke 0.3s ease;"></circle>
    </svg>
  </div>




  <!-- Experience Section -->
  <section class="section" id="experience" style="padding-top: 8rem; min-height: 80vh;">
    <div class="container">
      <div class="section-header reveal">
        <h2 class="gradient-text">My Experience</h2>
        <p>A timeline of my professional journey and the skills I've built along the way.</p>
      </div>
      
      <!-- Filter Bar -->
      <div class="filter-bar reveal">
        <div class="filter-group" title="Sort">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
          <select id="filterSort" class="filter-select">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
          </select>
        </div>
        <div class="filter-group" title="Category">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          <select id="filterCat" class="filter-select">
            <option value="all">Category</option>
            <!-- Categories loaded dynamically -->
          </select>
        </div>
        <div class="filter-group" title="Year">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <select id="filterYear" class="filter-select">
            <option value="all">Year</option>
            <!-- Years loaded dynamically -->
          </select>
        </div>
        <div class="filter-group" title="Month">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          <select id="filterMonth" class="filter-select">
            <option value="all">Month</option>
            <option value="01">Jan</option>
            <option value="02">Feb</option>
            <option value="03">Mar</option>
            <option value="04">Apr</option>
            <option value="05">May</option>
            <option value="06">Jun</option>
            <option value="07">Jul</option>
            <option value="08">Aug</option>
            <option value="09">Sep</option>
            <option value="10">Oct</option>
            <option value="11">Nov</option>
            <option value="12">Dec</option>
          </select>
        </div>
      </div>

      <div class="experience-list" id="experience-container">
        <!-- Loaded by JavaScript -->
      </div>
    </div>
  </section>



  <div id="modal-placeholder"></div>
  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://xufdsahxomccepetmdgu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_7Kv04furGIBlg3rkDqIZfA_Y3OrWWaJ';
    const SUPABASE_BUCKET = 'portfolio-images';
    let _sb = null;
    function getSupabase() {
      if (!_sb && SUPABASE_URL !== 'ISI_SUPABASE_URL_DISINI') {
        _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
      return _sb;
    }
    function isSupabaseConfigured() {
      return SUPABASE_URL !== 'ISI_SUPABASE_URL_DISINI' && SUPABASE_ANON_KEY !== 'ISI_SUPABASE_ANON_KEY_DISINI';
    }
  </script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/script.js"></script>
  <script src="assets/js/theme-physics.js"></script>
</body>

</html>
