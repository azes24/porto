<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | FAZIZ.</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Check if logged in
    if (localStorage.getItem('faziz_admin_logged_in') !== 'true') {
      window.location.href = '/login';
    }
  </script>
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  
  <div class="dashboard-layout">
    <aside class="sidebar">
      <h2 class="gradient-text">Admin Panel</h2>
      <nav>
        <a href="#" class="active">Experiences</a>
        <a href="#" onclick="logout(event)">Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h1 style="font-size: 2rem;">Manage Experiences</h1>
      </div>

      <div class="glass" style="padding: 2rem; margin-bottom: 2rem;">
        <h3 style="margin-bottom: 1rem;">Add New Experience</h3>
        <form style="display: flex; flex-direction: column; gap: 1rem;" onsubmit="event.preventDefault(); alert('To save data, please configure Supabase in script.js first!');">
          <div style="display: flex; gap: 1rem;">
            <input type="text" class="input" placeholder="Judul (e.g. Frontend Developer)" required>
            <input type="text" class="input" placeholder="Company / Organisasi" required>
          </div>
          <input type="text" class="input" placeholder="Tempat (e.g. Jakarta, Indonesia)" required>
          <textarea class="input" rows="3" placeholder="Deskripsi kegiatan/pengalaman" required></textarea>
          <div>
            <label style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 0.5rem; display: block;">Foto</label>
            <div class="file-upload-wrapper">
              <input type="file" id="file-upload" accept="image/*" multiple style="display: none;">
              <label for="file-upload" class="input file-upload-label" style="display: flex; align-items: center; justify-content: center; border-style: dashed; border-width: 2px; cursor: pointer; color: var(--text-secondary); transition: all 0.3s; padding: 2rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 10px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <span>Click to upload images</span>
              </label>
            </div>
            <div id="image-preview-container" style="display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;"></div>
          </div>
          <button type="submit" class="btn" style="width: fit-content; margin: 1rem auto 0;">Add Experience</button>
        </form>
      </div>

      <div class="glass" style="padding: 2rem;">
        <h3 style="margin-bottom: 1rem;">Current Experiences</h3>
        <p style="color: var(--text-secondary);">Experiences will appear here once Supabase is connected.</p>
      </div>
    </main>
  </div>

  <script>
    function logout(e) {
      e.preventDefault();
      localStorage.removeItem('faziz_admin_logged_in');
      window.location.href = '/login';
    }

    // Update file input label text when multiple files are selected
    const fileInput = document.getElementById('file-upload');
    const previewContainer = document.getElementById('image-preview-container');
    let selectedFiles = [];

    function updateFileInput() {
      const dt = new DataTransfer();
      selectedFiles.forEach(file => dt.items.add(file));
      fileInput.files = dt.files;
      
      const filesCount = selectedFiles.length;
      let text = 'Click to upload images';
      if (filesCount === 1) text = selectedFiles[0].name;
      if (filesCount > 1) text = filesCount + ' images selected';
      
      const label = document.querySelector('.file-upload-label span');
      if (label) label.textContent = text;
      
      renderPreviews();
    }

    function renderPreviews() {
      previewContainer.innerHTML = '';
      selectedFiles.forEach((file, index) => {
        if (!file.type.startsWith('image/')) return;

        const reader = new FileReader();
        reader.onload = function(event) {
          const wrapper = document.createElement('div');
          wrapper.style.position = 'relative';
          wrapper.style.display = 'inline-block';

          const img = document.createElement('img');
          img.src = event.target.result;
          img.style.width = '80px';
          img.style.height = '80px';
          img.style.objectFit = 'cover';
          img.style.borderRadius = '8px';
          img.style.border = '1px solid rgba(255,255,255,0.1)';

          const removeBtn = document.createElement('div');
          removeBtn.innerHTML = '&times;';
          removeBtn.style.position = 'absolute';
          removeBtn.style.top = '-5px';
          removeBtn.style.right = '-5px';
          removeBtn.style.background = '#ef4444';
          removeBtn.style.color = 'white';
          removeBtn.style.width = '20px';
          removeBtn.style.height = '20px';
          removeBtn.style.borderRadius = '50%';
          removeBtn.style.display = 'flex';
          removeBtn.style.alignItems = 'center';
          removeBtn.style.justifyContent = 'center';
          removeBtn.style.cursor = 'pointer';
          removeBtn.style.fontSize = '12px';
          removeBtn.style.fontWeight = 'bold';
          removeBtn.style.boxShadow = '0 2px 4px rgba(0,0,0,0.2)';
          
          removeBtn.onclick = (e) => {
            e.stopPropagation();
            e.preventDefault();
            selectedFiles.splice(index, 1);
            updateFileInput();
          };

          wrapper.appendChild(img);
          wrapper.appendChild(removeBtn);
          previewContainer.appendChild(wrapper);
        };
        reader.readAsDataURL(file);
      });
    }

    if (fileInput) {
      fileInput.addEventListener('change', function(e) {
        const newFiles = Array.from(e.target.files);
        selectedFiles = selectedFiles.concat(newFiles);
        updateFileInput();
      });
    }
  </script>
  <script src="../assets/js/script.js"></script>
</body>
</html>
