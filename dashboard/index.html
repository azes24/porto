<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | FAZIZ.</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://xufdsahxomccepetmdgu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_7Kv04furGIBlg3rkDqIZfA_Y3OrWWaJ';
    const SUPABASE_BUCKET = 'portfolio-images';
    let _sb = null;
    function getSupabase() {
      if (!_sb && SUPABASE_URL !== 'ISI_SUPABASE_URL_DISINI') {
        _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
      return _sb;
    }
    function isSupabaseConfigured() {
      return SUPABASE_URL !== 'ISI_SUPABASE_URL_DISINI' && SUPABASE_ANON_KEY !== 'ISI_SUPABASE_ANON_KEY_DISINI';
    }
  </script>
  <script>
    if (localStorage.getItem('faziz_admin_logged_in') !== 'true') {
      window.location.href = '/login';
    }
  </script>
  <style>
    .dash-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; flex-wrap:wrap; gap:1rem; }
    .dash-header h1 { font-size:1.8rem; }
    .status-badge { padding:0.4rem 1rem; border-radius:9999px; font-size:0.8rem; font-weight:600; }
    .status-connected { background:rgba(34,197,94,0.15); color:#22c55e; border:1px solid rgba(34,197,94,0.3); }
    .status-offline { background:rgba(239,68,68,0.15); color:#ef4444; border:1px solid rgba(239,68,68,0.3); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-grid .full-width { grid-column: 1 / -1; }
    .form-label { font-size:0.8rem; color:var(--text-secondary); font-weight:500; margin-bottom:0.4rem; display:block; text-transform:uppercase; letter-spacing:0.05em; }
    .upload-zone { border:2px dashed var(--border); border-radius:12px; padding:2.5rem; text-align:center; color:var(--text-secondary); cursor:pointer; transition:all 0.3s; }
    .upload-zone:hover { border-color:var(--accent-blue); background:rgba(59,130,246,0.05); }
    .upload-zone svg { margin-bottom:0.5rem; opacity:0.5; }
    .preview-grid { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
    .preview-item { position:relative; }
    .preview-item img { width:72px; height:72px; object-fit:cover; border-radius:8px; border:1px solid var(--border); }
    .preview-remove { position:absolute; top:-6px; right:-6px; width:20px; height:20px; background:#ef4444; color:#fff; border:none; border-radius:50%; font-size:11px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:bold; line-height:1; }
    .exp-list-item { display:flex; align-items:center; gap:1.25rem; padding:1.25rem; border-bottom:1px solid var(--border); transition:background 0.2s; }
    .exp-list-item:last-child { border-bottom:none; }
    .exp-list-item:hover { background:rgba(255,255,255,0.02); }
    .exp-list-thumb { width:56px; height:56px; border-radius:8px; object-fit:cover; flex-shrink:0; background:var(--bg-secondary); }
    .exp-list-info { flex:1; min-width:0; }
    .exp-list-info h4 { font-size:0.95rem; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .exp-list-info p { font-size:0.8rem; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .btn-danger { background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3); color:#ef4444; padding:0.5rem 1rem; font-size:0.8rem; }
    .btn-danger:hover { background:rgba(239,68,68,0.2); border-color:#ef4444; transform:translateY(-1px); }
    .toast { position:fixed; bottom:2rem; right:2rem; padding:1rem 1.5rem; border-radius:10px; font-size:0.9rem; z-index:99999; transform:translateY(100px); opacity:0; transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast-success { background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.3); color:#22c55e; backdrop-filter:blur(10px); }
    .toast-error { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#ef4444; backdrop-filter:blur(10px); }
    .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation:spin 0.6s linear infinite; display:inline-block; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .empty-state { text-align:center; padding:3rem; color:var(--text-secondary); }
    .btn-primary { background:var(--accent-blue); border-color:var(--accent-blue); color:#fff; padding:0.5rem 1rem; font-size:0.8rem; }
    .btn-primary:hover { background:rgba(59,130,246,0.8); transform:translateY(-1px); }
    .modal-overlay-edit { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(10,10,15,0.85); backdrop-filter:blur(8px); z-index:10000; display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:all 0.3s; }
    .modal-overlay-edit.active { opacity:1; visibility:visible; }
    .modal-content-edit { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:2rem; width:90%; max-width:600px; max-height:90vh; overflow-y:auto; position:relative; transform:scale(0.95); transition:all 0.3s; }
    .modal-overlay-edit.active .modal-content-edit { transform:scale(1); }
    .modal-close-edit { position:absolute; top:15px; right:20px; background:transparent; border:none; color:var(--text-primary); font-size:1.5rem; cursor:pointer; }
    .empty-state svg { opacity:0.3; margin-bottom:1rem; }
    @media(max-width:768px) { .form-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>

  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  
  <div class="dashboard-layout">
    <aside class="sidebar">
      <h2 class="gradient-text">Admin Panel</h2>
      <nav>
        <a href="#" class="active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:8px;"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>
          Experiences
        </a>
        <a href="/" style="margin-top:auto;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:8px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          View Site
        </a>
        <a href="#" onclick="logout(event)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:8px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Logout
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="dash-header">
        <h1>Manage Experiences</h1>
        <span class="status-badge" id="dbStatus">Checking...</span>
      </div>

      <!-- Add Form -->
      <div class="glass" style="padding:2rem; margin-bottom:2rem;">
        <h3 style="margin-bottom:1.25rem;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
          Add New Experience
        </h3>
        <form id="addForm" class="form-grid">
          <div>
            <label class="form-label">Title</label>
            <input type="text" id="f-title" class="input" placeholder="e.g. Frontend Developer" required>
          </div>
          <div>
            <label class="form-label">Company / Organization</label>
            <input type="text" id="f-company" class="input" placeholder="e.g. Tech Corp" required>
          </div>
          <div class="full-width">
            <label class="form-label">Location</label>
            <input type="text" id="f-location" class="input" placeholder="e.g. Jakarta, Indonesia" required>
          </div>
          <div class="full-width">
            <label class="form-label">Description</label>
            <textarea id="f-desc" class="input" rows="3" placeholder="Describe the experience..." required></textarea>
          </div>
          <div class="full-width">
            <label class="form-label">Images</label>
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('f-files').click()">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              <p style="font-size:0.9rem;">Click to upload images</p>
            </div>
            <input type="file" id="f-files" accept="image/*" multiple style="display:none;">
            <div class="preview-grid" id="previewGrid"></div>
          </div>
          <div class="full-width" style="text-align:center; margin-top:0.5rem;">
            <button type="submit" class="btn" id="submitBtn" style="min-width:200px;">Add Experience</button>
          </div>
        </form>
      </div>

      <!-- Current Experiences -->
      <div class="glass" style="padding:2rem;">
        <h3 style="margin-bottom:1rem;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
          Current Experiences
        </h3>
        <div id="expList">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
            <p>Loading experiences...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay-edit" id="editModal">
    <div class="modal-content-edit">
      <button class="modal-close-edit" onclick="closeEditModal()">&times;</button>
      <h3 style="margin-bottom:1.5rem;">Edit Experience</h3>
      <form id="editForm" class="form-grid">
        <input type="hidden" id="e-id">
        <div>
          <label class="form-label">Title</label>
          <input type="text" id="e-title" class="input" required>
        </div>
        <div>
          <label class="form-label">Company / Organization</label>
          <input type="text" id="e-company" class="input" required>
        </div>
        <div class="full-width">
          <label class="form-label">Location</label>
          <input type="text" id="e-location" class="input" required>
        </div>
        <div class="full-width">
          <label class="form-label">Description</label>
          <textarea id="e-desc" class="input" rows="3" required></textarea>
        </div>
        <div class="full-width">
          <label class="form-label">Current Images</label>
          <div class="preview-grid" id="editExistingPreviewGrid" style="margin-bottom:1rem;"></div>
          
          <label class="form-label">Add New Images</label>
          <div class="upload-zone" onclick="document.getElementById('e-files').click()" style="padding:1.5rem;">
            <p style="font-size:0.85rem; margin:0;">Click to add more images</p>
          </div>
          <input type="file" id="e-files" accept="image/*" multiple style="display:none;">
          <div class="preview-grid" id="editNewPreviewGrid"></div>
        </div>
        <div class="full-width" style="text-align:right; margin-top:1rem;">
          <button type="button" class="btn" style="background:transparent; border-color:var(--border);" onclick="closeEditModal()">Cancel</button>
          <button type="submit" class="btn" id="editSubmitBtn" style="margin-left:0.5rem; min-width:120px;">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ─── Toast Notification ───
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast toast-' + (type || 'success') + ' show';
      setTimeout(() => { t.classList.remove('show'); }, 3000);
    }

    // ─── Logout ───
    function logout(e) {
      e.preventDefault();
      localStorage.removeItem('faziz_admin_logged_in');
      window.location.href = '/login';
    }

    // ─── File Upload Preview ───
    let selectedFiles = [];
    const fileInput = document.getElementById('f-files');
    const previewGrid = document.getElementById('previewGrid');

    fileInput.addEventListener('change', function(e) {
      const newFiles = Array.from(e.target.files);
      selectedFiles = selectedFiles.concat(newFiles);
      renderPreviews();
    });

    function renderPreviews() {
      previewGrid.innerHTML = '';
      selectedFiles.forEach((file, i) => {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const div = document.createElement('div');
          div.className = 'preview-item';
          div.innerHTML = '<img src="' + e.target.result + '"><button class="preview-remove" type="button">&times;</button>';
          div.querySelector('.preview-remove').onclick = () => {
            selectedFiles.splice(i, 1);
            renderPreviews();
          };
          previewGrid.appendChild(div);
        };
        reader.readAsDataURL(file);
      });
    }

    // ─── Check DB Status ───
    const dbBadge = document.getElementById('dbStatus');
    const configured = isSupabaseConfigured();

    if (configured) {
      dbBadge.textContent = '● Connected';
      dbBadge.className = 'status-badge status-connected';
    } else {
      dbBadge.textContent = '● Not Configured';
      dbBadge.className = 'status-badge status-offline';
    }

    // ─── Load Experiences ───
    let currentExperiencesData = [];
    async function loadDashboardExperiences() {
      const list = document.getElementById('expList');
      if (!configured) {
        list.innerHTML = '<div class="empty-state"><p>Supabase belum dikonfigurasi.<br><small style="color:var(--text-secondary);">Edit file <code>assets/js/supabase-config.js</code> dan isi URL + Key kamu.</small></p></div>';
        return;
      }
      try {
        const sb = getSupabase();
        const { data, error } = await sb.from('experiences').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        if (!data || data.length === 0) {
          list.innerHTML = '<div class="empty-state"><p>Belum ada experience. Tambahkan yang pertama!</p></div>';
          return;
        }
        currentExperiencesData = data;
        list.innerHTML = '';
        data.forEach(exp => {
          const thumb = exp.images && exp.images.length > 0 ? exp.images[0] : '';
          const div = document.createElement('div');
          div.className = 'exp-list-item';
          div.innerHTML =
            (thumb ? '<img class="exp-list-thumb" src="' + thumb + '">' : '<div class="exp-list-thumb" style="display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:var(--text-secondary);">No img</div>') +
            '<div class="exp-list-info"><h4>' + exp.title + '</h4><p>' + exp.company + ' · ' + exp.location + '</p></div>' +
            '<div style="display:flex; gap:0.5rem;">' +
              '<button class="btn btn-primary" onclick="openEditModal(\'' + exp.id + '\')">Edit</button>' +
              '<button class="btn btn-danger" onclick="deleteExp(\'' + exp.id + '\')">Delete</button>' +
            '</div>';
          list.appendChild(div);
        });
      } catch (e) {
        list.innerHTML = '<div class="empty-state"><p style="color:#ef4444;">Error: ' + e.message + '</p></div>';
      }
    }

    loadDashboardExperiences();

    // ─── Add Experience ───
    document.getElementById('addForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');

      if (!configured) {
        showToast('Supabase belum dikonfigurasi! Edit supabase-config.js', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Uploading...';

      try {
        const sb = getSupabase();
        let imageUrls = [];

        // Upload images to storage
        for (const file of selectedFiles) {
          const fileName = Date.now() + '_' + Math.random().toString(36).substr(2,9) + '_' + file.name;
          const { data: upData, error: upErr } = await sb.storage.from(SUPABASE_BUCKET).upload(fileName, file);
          if (upErr) throw upErr;
          const { data: urlData } = sb.storage.from(SUPABASE_BUCKET).getPublicUrl(fileName);
          imageUrls.push(urlData.publicUrl);
        }

        // Insert record
        const { error: insertErr } = await sb.from('experiences').insert({
          title: document.getElementById('f-title').value,
          company: document.getElementById('f-company').value,
          location: document.getElementById('f-location').value,
          description: document.getElementById('f-desc').value,
          images: imageUrls
        });

        if (insertErr) throw insertErr;

        showToast('Experience berhasil ditambahkan!', 'success');
        document.getElementById('addForm').reset();
        selectedFiles = [];
        previewGrid.innerHTML = '';
        loadDashboardExperiences();

      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Add Experience';
      }
    });

    // ─── Edit Experience Logic ───
    let editSelectedFiles = [];
    let editExistingImages = [];

    function openEditModal(id) {
      const exp = currentExperiencesData.find(e => e.id === id);
      if (!exp) return;

      document.getElementById('e-id').value = exp.id;
      document.getElementById('e-title').value = exp.title;
      document.getElementById('e-company').value = exp.company;
      document.getElementById('e-location').value = exp.location;
      document.getElementById('e-desc').value = exp.description;
      
      editExistingImages = exp.images ? [...exp.images] : [];
      editSelectedFiles = [];
      
      renderEditExistingPreviews();
      renderEditNewPreviews();
      
      document.getElementById('editModal').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
    }

    function renderEditExistingPreviews() {
      const grid = document.getElementById('editExistingPreviewGrid');
      grid.innerHTML = '';
      if (editExistingImages.length === 0) {
        grid.innerHTML = '<p style="font-size:0.8rem;color:var(--text-secondary);">No existing images</p>';
        return;
      }
      editExistingImages.forEach((imgUrl, i) => {
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.innerHTML = '<img src="' + imgUrl + '"><button class="preview-remove" type="button" title="Remove">&times;</button>';
        div.querySelector('.preview-remove').onclick = () => {
          editExistingImages.splice(i, 1);
          renderEditExistingPreviews();
        };
        grid.appendChild(div);
      });
    }

    const editFileInput = document.getElementById('e-files');
    const editNewPreviewGrid = document.getElementById('editNewPreviewGrid');

    editFileInput.addEventListener('change', function(e) {
      const newFiles = Array.from(e.target.files);
      editSelectedFiles = editSelectedFiles.concat(newFiles);
      renderEditNewPreviews();
    });

    function renderEditNewPreviews() {
      editNewPreviewGrid.innerHTML = '';
      editSelectedFiles.forEach((file, i) => {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const div = document.createElement('div');
          div.className = 'preview-item';
          div.innerHTML = '<img src="' + e.target.result + '"><button class="preview-remove" type="button">&times;</button>';
          div.querySelector('.preview-remove').onclick = () => {
            editSelectedFiles.splice(i, 1);
            renderEditNewPreviews();
          };
          editNewPreviewGrid.appendChild(div);
        };
        reader.readAsDataURL(file);
      });
    }

    document.getElementById('editForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('editSubmitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Saving...';

      try {
        const sb = getSupabase();
        let finalImageUrls = [...editExistingImages];

        // Upload new images to storage
        for (const file of editSelectedFiles) {
          const fileName = Date.now() + '_' + Math.random().toString(36).substr(2,9) + '_' + file.name;
          const { data: upData, error: upErr } = await sb.storage.from(SUPABASE_BUCKET).upload(fileName, file);
          if (upErr) throw upErr;
          const { data: urlData } = sb.storage.from(SUPABASE_BUCKET).getPublicUrl(fileName);
          finalImageUrls.push(urlData.publicUrl);
        }

        // Update record
        const id = document.getElementById('e-id').value;
        const { error: updateErr } = await sb.from('experiences').update({
          title: document.getElementById('e-title').value,
          company: document.getElementById('e-company').value,
          location: document.getElementById('e-location').value,
          description: document.getElementById('e-desc').value,
          images: finalImageUrls
        }).eq('id', id);

        if (updateErr) throw updateErr;

        showToast('Experience berhasil diupdate!', 'success');
        closeEditModal();
        loadDashboardExperiences();

      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Save Changes';
      }
    });

    // ─── Delete Experience ───
    async function deleteExp(id) {
      if (!confirm('Yakin ingin menghapus experience ini?')) return;
      try {
        const sb = getSupabase();
        const { error } = await sb.from('experiences').delete().eq('id', id);
        if (error) throw error;
        showToast('Experience berhasil dihapus!', 'success');
        loadDashboardExperiences();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }
  </script>
  <script src="/assets/js/script.js"></script>
</body>
</html>
